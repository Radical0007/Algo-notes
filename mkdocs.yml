site_name: Algo Notes
site_url: https://Radical0007.github.io/Algo-notes/
site_description: 算法题解、模板整理、专题训练与比赛复盘
repo_url: https://github.com/Radical0007/Algo-notes
repo_name: algo-notes
edit_uri: edit/main/docs/

theme:
  name: material
  language: zh
  icon:
    repo: fontawesome/brands/github
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: 切换到浅色模式
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: 切换到深色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: 跟随系统

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences

nav:
  - 首页: index.md

  - 刷题题解:
      - Codeforces: solutions/codeforces/index.md
      - 牛客: solutions/nowcoder/index.md
      - 洛谷: solutions/luogu/index.md
      - 码蹄集: solutions/matiji/index.md
      - ACWing: solutions/acwing/index.md
      - 其他: solutions/others/index.md

  - 博客算法思想:
      - 模块首页: blog/index.md
      - 双指针: blog/two-pointers.md
      - 二分: blog/binary-search.md
      - DP 思想: blog/dp-thinking.md

  - 算法模板:
      - 模块首页: templates/index.md
      - 并查集: templates/union-find.md
      - 树状数组: templates/fenwick.md
      - 线段树: templates/segment-tree.md

  - 专题训练:
      - 模块首页: topics/index.md
      - 动态规划: topics/dp.md
      - 图论: topics/graph.md
      - 贪心: topics/greedy.md

  - 比赛记录:
      - 模块首页: contests/index.md

  - 关于: about.md
